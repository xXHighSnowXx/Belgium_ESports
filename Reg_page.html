<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC Esports event</title>
    <link rel="stylesheet" href="./Reg_style.css">

</head>

<body>
    <header>
        <h1>Registration</h1>
    </header>
    <!-- Checkbox for toggle (hidden) -->
    <input type="checkbox" id="navbar-toggle" class="navbar-toggle">

    <!-- Hamburger Button Label -->
    <label for="navbar-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <!-- Collapsing Navbar -->
    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="https://scp-wiki.wikidot.com/scp-999">Contact</a></li>
        </ul>
    </nav>

    <Main>


        <h2>Ready to take your game to the next level? Complete the form below to apply for our practice sessions</h2>






        <div id="registration">
            <div class="colum">
                <form action="#" class="holds">
                    <label class="labels-f">Username:</label>
                    <input required placeholder="Enter Your Gamertag" type="text" class="blox" id="username" required>
                </form>

                <form action="#" class="holds">
                    <label class="labels-f">First_name:</label>
                    <input required placeholder="Enter First name" type="text" class="blox">
                </form>
                <form action="#" class="holds">
                    <label class="labels-f">Surname:</label>
                    <input required placeholder="Enter Surname" type="text" class="blox">
                </form>
            </div>
            <div class="colum">
                <form action="#" class="holds">
                    <label class="labels-f">Student Number:</label>
                    <input required placeholder="Enter your Student Number" type="text" class="blox">
                </form>
                <form action="#" class="holds">
                    <label for="" class="labels-f">Emial:</label>
                    <input required placeholder="Enter your Emial" type="text" class="blox">
                </form>
                <form action="#" class="holds">
                    <label for="" class="labels-f">Gamer ID:</label>
                    <input required placeholder="Enter Gamertag" type="text" class="blox">
                </form>
            </div>
        </div>
        <div class="back-button">
            <a href="">Submit</a>
        </div>
    </Main>
    <footer>
        <img src="./images/BC-logo-white-350w.webp" alt="Belgium Campus Logo">
        <p><b>Contact us:</b></p>
        <p>info@esportevents.com</p>
    </footer>



</body>

</html>
